name: HawkEdge CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    runs-on: ubuntu-latest
    
    # Spin up backing services for integration and unit testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hawkedge_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm package manager
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Restore pnpm Cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Database Schema
        run: pnpm --filter @hawkedge/database exec prisma validate

      - name: Lints & Code Style Enforcements
        run: pnpm lint

      - name: Strict TypeScript Compilation Check
        run: |
          # Set skip env validation to skip start validations during build compile
          export SKIP_ENV_VALIDATION=true
          pnpm build

      - name: Synchronize Test Database Schema
        run: pnpm --filter @hawkedge/database db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hawkedge_dev?schema=public

      - name: Run Workspace Unit Tests
        run: pnpm test

      - name: Run E2E Business Workflow Integration Tests
        run: npx ts-node scripts/test-e2e.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hawkedge_dev?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: hawkedge_access_secret_key_development_only_change_in_production
          JWT_REFRESH_SECRET: hawkedge_refresh_secret_key_development_only_change_in_production

      - name: Run Dependency Security Audit
        run: pnpm audit --prod

  docker-build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: hawkedge/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web App Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: hawkedge/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Platform Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/platform/Dockerfile
          push: false
          tags: hawkedge/platform:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin OS Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: hawkedge/admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    # Configure manual review gating using GitHub Environments
    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://${{ github.event.inputs.environment == 'production' && 'hawkedge.tech' || 'staging.hawkedge.tech' }}
      
    steps:
      - name: Print deployment target
        run: |
          echo "Promoting build stack release to environment: ${{ github.event.inputs.environment }}"
          echo "Deployment steps successfully initialized (mock deployment targets execution)."
