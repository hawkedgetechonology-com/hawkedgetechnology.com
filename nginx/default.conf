# API Gateway Gateway (api.hawkedge.tech)
server {
    listen 443 ssl http2;
    server_name api.hawkedge.tech;
    client_max_body_size 15M; # Support larger JSON payloads/documents uploads

    ssl_certificate /etc/nginx/certs/hawkedge.crt;
    ssl_certificate_key /etc/nginx/certs/hawkedge.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        # Limit connections: burst to 20, throttle delay for burst buffer
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
