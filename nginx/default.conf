# Gzip Compression configuration
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_proxied any;
gzip_min_length 1000;
gzip_comp_level 6;

# Rate Limiting Zone setup
# 10MB zone allows holding metadata for ~160,000 IPs. Rate limited to 10 requests per second.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# HTTPS Redirect Block
server {
    listen 80;
    server_name hawkedge.tech studio.hawkedge.tech admin.hawkedge.tech api.hawkedge.tech;
    return 301 https://$host$request_uri;
}

# Marketing Web Application (hawkedge.tech)
server {
    listen 443 ssl http2;
    server_name hawkedge.tech;
    client_max_body_size 10M;

    ssl_certificate /etc/nginx/certs/hawkedge.crt;
    ssl_certificate_key /etc/nginx/certs/hawkedge.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https:;" always;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Cache Rules for Next.js build assets
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache Rules for static web assets (images, icons, media)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?|eot|ttf|otf)$ {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
}

