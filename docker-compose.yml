version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: hawkedge_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hawkedge_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: hawkedge_redis_dev
    ports:
      - '6379:6379'
    volumes:
      - redisdata_dev:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: hawkedge_api_dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/hawkedge_dev?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 5000
      NODE_ENV: development
    ports:
      - '5000:5000'
    depends_on:
      - database
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hawkedge_web_dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/hawkedge_dev?schema=public
      API_BASE_URL: http://api:5000/api
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - api

  platform:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
    container_name: hawkedge_platform_dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/hawkedge_dev?schema=public
      API_BASE_URL: http://api:5000/api
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: hawkedge_admin_dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/hawkedge_dev?schema=public
      API_BASE_URL: http://api:5000/api
      NODE_ENV: development
    ports:
      - '3002:3002'
    depends_on:
      - api

volumes:
  pgdata_dev:
  redisdata_dev:
