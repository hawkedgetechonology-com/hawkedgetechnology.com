version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: hawkedge_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hawkedge_production_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-hawkedge_production}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - database_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: hawkedge_redis_prod
    volumes:
      - redisdata_prod:/data
    networks:
      - cache_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: hawkedge_api_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hawkedge_production_secure_pwd}@database:5432/${POSTGRES_DB:-hawkedge_production}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-hawkedge_access_secret_key_production_only_change_now}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-hawkedge_refresh_secret_key_production_only_change_now}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://hawkedge.tech,https://studio.hawkedge.tech,https://admin.hawkedge.tech}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - database_network
      - cache_network
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hawkedge_web_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hawkedge_production_secure_pwd}@database:5432/${POSTGRES_DB:-hawkedge_production}?schema=public
      API_BASE_URL: http://api:5000/api
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - database_network
      - app_network
    restart: always

  platform:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
    container_name: hawkedge_platform_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hawkedge_production_secure_pwd}@database:5432/${POSTGRES_DB:-hawkedge_production}?schema=public
      API_BASE_URL: http://api:5000/api
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-hawkedge_access_secret_key_production_only_change_now}
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - database_network
      - app_network
    restart: always

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: hawkedge_admin_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hawkedge_production_secure_pwd}@database:5432/${POSTGRES_DB:-hawkedge_production}?schema=public
      API_BASE_URL: http://api:5000/api
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - database_network
      - app_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hawkedge_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - platform
      - admin
      - api
    networks:
      - app_network
    restart: always

networks:
  database_network:
    driver: bridge
  cache_network:
    driver: bridge
  app_network:
    driver: bridge

volumes:
  pgdata_prod:
  redisdata_prod:
